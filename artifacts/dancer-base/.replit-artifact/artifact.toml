kind = "web"
previewPath = "/"
title = "dancerBase"
version = "1.0.0"
id = "artifacts/dancer-base"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19727

[services.development]
run = "pnpm --filter @workspace/dancer-base run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dancer-base", "run", "build" ]
publicDir = "artifacts/dancer-base/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19727"
BASE_PATH = "/"
